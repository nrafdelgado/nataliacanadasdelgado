<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Meu Portfólio</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #111;
      color: white;
      text-align: center;
    }

    header {
      padding: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 10px;
      padding: 20px;
    }

    .grid img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>O meu portfólio</h1>
  <p>Ilustração digital</p>
</header>

<div class="grid">
  <img src="https://placehold.co/600x600">
  <img src="https://placehold.co/600x600">
  <img src="https://placehold.co/600x600">
</div>

</body>
</html>
